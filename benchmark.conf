# --- Longevity benchmark (sustained load for days) ---
LONGEVITY_EDITIONS="advanced"
LONGEVITY_DAYS=7
# LONGEVITY_DURATION_SEC=604800        # optional exact override in seconds
LONGEVITY_THREADS=32
LONGEVITY_WARMUP_SEC=300
